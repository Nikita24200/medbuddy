<style>

  .hero { text-align: center; padding: 80px 20px 56px; position: relative; z-index: 10; }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(79,142,247,0.1); color: var(--accent); border: 1px solid rgba(79,142,247,0.25); border-radius: 24px; padding: 6px 18px; font-size: 12px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 28px; backdrop-filter: blur(8px); }

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ---- THEME ----
function useTheme() {
  const [theme, setTheme] = useState(() => localStorage.getItem('medbuddy_theme') || 'dark');
  useEffect(() => {
    document.body.classList.toggle('light', theme === 'light');
    localStorage.setItem('medbuddy_theme', theme);
  }, [theme]);
  const toggle = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  return [theme, toggle];
}

// ---- HELPERS ----
function parseTimingToReminders(timing) {
  if (!timing || timing === 'Not specified') return [];
  const t = timing.toLowerCase();
  if (t.includes('once') || t.includes('daily') && !t.includes('twice') && !t.includes('three')) return ['9:00 AM'];
  if (t.includes('twice') || t.includes('two') || t.includes('2 times') || t.includes('bd') || t.includes('bid')) return ['9:00 AM', '9:00 PM'];
  if (t.includes('three') || t.includes('thrice') || t.includes('3 times') || t.includes('tid') || t.includes('tds')) return ['8:00 AM', '2:00 PM', '8:00 PM'];
  if (t.includes('four') || t.includes('qid') || t.includes('4 times')) return ['8:00 AM', '12:00 PM', '4:00 PM', '8:00 PM'];
  if (t.includes('morning') || t.includes('am')) return ['9:00 AM'];
  if (t.includes('night') || t.includes('bed')) return ['9:00 PM'];
  return ['9:00 AM'];
}

function buildSchedule(medications) {
  const slots = {};
  medications.forEach(med => {
    const times = parseTimingToReminders(med.timing);
    times.forEach(time => {
      if (!slots[time]) slots[time] = [];
      slots[time].push(med.name);
    });
  });
  return Object.entries(slots).sort((a, b) => {
    const toMin = s => {
      const [h, rest] = s.split(':');
      const [m, period] = rest.split(' ');
      let hr = parseInt(h);
      if (period === 'PM' && hr !== 12) hr += 12;
      if (period === 'AM' && hr === 12) hr = 0;
      return hr * 60 + parseInt(m);
    };
    return toMin(a[0]) - toMin(b[0]);
  });
}

// ---- API CALLS ----
async function analyzeAPI(text, age, language, token, filesList) {
  const formData = new FormData();
  formData.append('text', text || '');
  formData.append('age', age || '');
  formData.append('language', language || 'English');
  if (filesList && filesList.length > 0) {
    filesList.forEach(f => formData.append('files', f));
  }
  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}` },
    body: formData
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Server error');
  return data;
}

// ---- AUTH MODAL ----
function AuthModal({ mode, onClose, onAuth }) {
  const [isLogin, setIsLogin] = useState(mode === 'login');
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');

  const handleSubmit = async () => {
    if (!email || !password) return;
    try {
      const endpoint = isLogin ? '/api/auth/login' : '/api/auth/signup';
      const payload = isLogin ? { email, password } : { name, email, password };
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error); return; }
      localStorage.setItem('medbuddy_token', data.token);
      localStorage.setItem('medbuddy_user', JSON.stringify(data.user));
      onAuth(data.user, data.token);
      onClose();
    } catch(err) {
      alert("Auth error. Make sure backend is running.");
    }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{position:'relative'}}>
        <button className="close-modal" onClick={onClose}>✕</button>
        <h2>{isLogin ? 'Welcome back' : 'Create account'}</h2>
        <p>{isLogin ? 'Sign in to your MedBuddy account' : 'Start your health journey today'}</p>
        {!isLogin && (
          <div className="form-group">
            <label>Full Name</label>
            <input placeholder="Patient Name" value={name} onChange={e => setName(e.target.value)} />
          </div>
        )}
        <div className="form-group">
          <label>Email</label>
          <input type="email" placeholder="you@email.com" value={email} onChange={e => setEmail(e.target.value)} />
        </div>
        <div className="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} />
        </div>
        <button className="submit-btn" onClick={handleSubmit}>
          {isLogin ? '→ Sign In' : '→ Create Account'}
        </button>
        <div className="modal-switch">
          {isLogin ? "Don't have an account? " : "Already have an account? "}
          <button onClick={() => setIsLogin(!isLogin)}>{isLogin ? 'Sign up' : 'Sign in'}</button>
        </div>
      </div>
    </div>
  );
}

// ---- TOAST ----
function Toast({ msg, icon }) {
  return (
    <div className="toast">
      <span>{icon}</span>

function App() {

  const fileRef = useRef();

  // ALARM FEATURE: Check time every minute
  useEffect(() => {
    const interval = setInterval(() => {
      const now = new Date();
      let hours = now.getHours();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      const minutes = now.getMinutes().toString().padStart(2, '0');
      // e.g. "9:00 AM" or "10:30 PM"
      const timeString = `${hours}:${minutes} ${ampm}`;

      if (result && result.medications) {
        result.medications.forEach(med => {
          if (reminders[med.name]) {
            const times = parseTimingToReminders(med.timing);
            if (times.includes(timeString)) {
              showToast(`Time to take your medicine: ${med.name}`, '⚠️');
              if (Notification.permission === 'granted') {
                new Notification('MedBuddy Reminder', { body: `Time to take: ${med.name}` });
              }
              try {
                // simple web audio beep fallback
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); 
                oscillator.connect(audioCtx.destination);
                oscillator.start();
                setTimeout(() => oscillator.stop(), 800);
              } catch(e) {}
            }
          }
        });
      }
    }, 60000);
    return () => clearInterval(interval);
  }, [reminders, result]);

  const fetchHistory = async (tkn) => {
    try {
      const res = await fetch('/api/history', {
        headers: { 'Authorization': `Bearer ${tkn}` }
      });
      if (res.ok) {
        const data = await res.json();
        // format history to match old structure
        const formatted = data.map(d => ({
          id: d.id,
          date: new Date(d.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }),
          summary: d.summary,
          medications: d.medications ? d.medications.length : 0,
          result: d, // the prescription object
          text: d.rawText
        }));
        setHistory(formatted);
      }
    } catch(err) { console.error(err); }
  };

  useEffect(() => {
    const u = localStorage.getItem('medbuddy_user');
    const t = localStorage.getItem('medbuddy_token');
    if (u && t) {
      setUser(JSON.parse(u));
      setToken(t);
      fetchHistory(t);
    }
  }, []);

  const handleAuth = (u, t) => {
    setUser(u);
    setToken(t);
    fetchHistory(t);
  };

  const showToast = (msg, icon = '✅') => {
    setToast({ msg, icon });
    setTimeout(() => setToast(null), 3500);
  };

  const handleFiles = (newFiles) => { setFiles(prev => [...prev, ...Array.from(newFiles)]); };
  const removeFile = (i) => setFiles(prev => prev.filter((_, idx) => idx !== i));

  const handleAnalyze = async () => {
    if (!token) {

      return;
    }
    const hasInput = files.length > 0 || textInput.trim();
    if (!hasInput) { setError('Please upload a file or paste prescription text.'); return; }
    
    setError(''); setLoading(true); setLoadStep(0); setResult(null);

    try {
      let text = textInput.trim();

      setLoadStep(1);
      await new Promise(r => setTimeout(r, 600));

      // For text files, read content client-side
      if (files.length > 0 && !text) {
        for (const f of files) {
          if (f.type === 'text/plain') {
            text += await f.text();
          }
        }
      }

      setExtractedText(text || 'Prescription image analyzed.');
      setLoadStep(2);
      await new Promise(r => setTimeout(r, 500));

      setLoadStep(3);
      // Send actual files to backend for Gemini image analysis
      const data = await analyzeAPI(text, age, language, token, files);
      
      setLoadStep(4);
      await new Promise(r => setTimeout(r, 400));

      setResult(data.result);
      fetchHistory(token);
      setActiveTab('results');

    } catch (e) {
      setError('Analysis failed: ' + e.message + '. Please check your input and try again.');
    } finally {
      setLoading(false); setLoadStep(0);
    }
  };

  const toggleReminder = (medName) => {
    setReminders(prev => {

        if (Notification.permission === 'granted') {

            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div className="user-avatar" title={user.email}>{user.name[0].toUpperCase()}</div>
              <button className="nav-btn" onClick={()=>{localStorage.removeItem('medbuddy_user');localStorage.removeItem('medbuddy_token');setUser(null);setToken(null);setHistory([]);}}>Sign out</button>
            </div>
          ) : (
            <>
              <button className="nav-btn" onClick={()=>setAuthModal('login')}>Sign in</button>
              <button className="nav-btn primary" onClick={()=>setAuthModal('signup')}>Sign up</button>
            </>
          )}
        </div>
      </header>

      <main className="main">
        {/* HERO */}
        <div className="hero">
          <div className="hero-badge">🏥 AI Healthcare Assistant</div>
          <h1>Your prescription,<br/><em>simplified.</em></h1>
          <p>Upload a prescription or discharge summary. Get a clear, simple breakdown in seconds.</p>
        </div>

        {/* TAB NAV */}
        <div className="tab-nav">
          <button className={`tab-btn ${activeTab==='analyze'?'active':''}`} onClick={()=>setActiveTab('analyze')}>
            🔬 Analyze
          </button>
          {result && (
            <button className={`tab-btn ${activeTab==='results'?'active':''}`} onClick={()=>setActiveTab('results')}>
              📋 Results
            </button>
          )}
          {result && (
            <button className={`tab-btn ${activeTab==='schedule'?'active':''}`} onClick={()=>setActiveTab('schedule')}>
              ⏰ Schedule
            </button>
          )}
          <button className={`tab-btn ${activeTab==='history'?'active':''}`} onClick={()=>setActiveTab('history')}>
            📁 History
          </button>
        </div>

        {/* ---- ANALYZE TAB ---- */}
        {activeTab === 'analyze' && (
          <div className="fade-in">
            <div className="upload-section">
              <div className="section-title">Upload Prescription</div>
              <div className="section-sub">PDF, image, or paste text directly below</div>

              <div
                className={`upload-area ${dragOver?'drag-over':''}`}
                onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                onDragLeave={()=>setDragOver(false)}
                onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files);}}
                onClick={()=>fileRef.current.click()}
              >
                <div className="upload-icon">📎</div>
                <h3>Drop files here, or click to browse</h3>
                <p>Supports PDF, PNG, JPG, TXT · Max 10MB</p>
                <input ref={fileRef} type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.txt" onChange={e=>handleFiles(e.target.files)} style={{display:'none'}} />
              </div>

              {files.length > 0 && (
                <div className="file-chips">
                  {files.map((f,i) => (
                    <div key={i} className="file-chip">
                      📄 {f.name}
                      <button onClick={()=>removeFile(i)}>✕</button>
                    </div>
                  ))}
                </div>
              )}

              <div className="or-divider">or paste text</div>

              <textarea
                className="text-input"
                placeholder="Paste your prescription text, discharge summary, or any medical notes here..."
                value={textInput}
                onChange={e=>setTextInput(e.target.value)}
              />

              <div className="options-grid">
                <div className="opt-group">
                  <label>Patient Age (optional)</label>
                  <input className="opt-input" type="number" placeholder="e.g. 45" value={age} onChange={e=>setAge(e.target.value)} />
                </div>
                <div className="opt-group">
                  <label>Output Language</label>
                  <select className="opt-input" value={language} onChange={e=>setLanguage(e.target.value)}>
                    <option>English</option>
                    <option>Hindi</option>
                  </select>
                </div>
              </div>

              {error && <div className="error-box">⚠️ {error}</div>}

              <button className="analyze-btn" onClick={handleAnalyze} disabled={loading}>
                {loading ? <><div className="spinner"></div> Analyzing...</> : '🔬 Analyze Prescription'}
              </button>
            </div>

            {loading && (
              <div className="loading-card fade-in">
                <div className="pulse-ring">🧠</div>
                <div style={{fontFamily:"'Instrument Serif',serif",fontSize:24,marginBottom:8}}>Analyzing your prescription</div>
                <div style={{color:'var(--ink3)',fontSize:14}}>Our AI is carefully reading every detail...</div>
                <div className="loading-steps">
                  {steps.map((s,i) => (
                    <div key={i} className={`loading-step ${loadStep>i?'done':loadStep===i?'active':'pending'}`}>
                      <span>{loadStep>i?'✓':s.icon}</span>
                      {s.label}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ---- RESULTS TAB ---- */}
        {activeTab === 'results' && result && (
          <div className="fade-in">
            <div className="disclaimer">
              <span className="disclaimer-icon">⚠️</span>
              <p><strong>Safety Notice:</strong> This is AI-generated information for reference only. Always consult your doctor or pharmacist before making any medical decisions.</p>
            </div>

            <div className="results-header">
              <div className="results-title">📋 Your Report</div>
              <div className="results-actions">
                <button className="action-btn green" onClick={handleShare}>📋 Copy</button>
                <button className="action-btn green" onClick={handleWhatsApp}>💬 WhatsApp</button>
                <button className="action-btn red" onClick={()=>{setResult(null);setActiveTab('analyze');}}>+ New</button>
              </div>
            </div>

            <div className="card" style={{marginBottom:20,background:'var(--accent-light)',borderColor:'rgba(200,75,47,0.2)'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <span style={{fontSize:20}}>💡</span>
                <span style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',color:'var(--accent)'}}>Summary</span>
              </div>
              <div style={{fontSize:16,fontWeight:500,color:'var(--ink)',lineHeight:1.6,fontFamily:"'Instrument Serif',serif"}}>{result.summary}</div>
            </div>

            <div className="cards-grid" style={{marginBottom:20}}>
              <div className="card">
                <div className="card-header">
                  <div className="card-icon red">🩺</div>
                  <div className="card-label">Diagnosis</div>
                </div>
                <div className="card-content">{result.diagnosis}</div>
              </div>

              {result.side_effects && result.side_effects.length > 0 && (
                <div className="card">
                  <div className="card-header">
                    <div className="card-icon gold">⚠️</div>
                    <div className="card-label">Side Effects</div>
                  </div>
                  <div className="list-items">
                    {result.side_effects.map((s,i) => (
                      <div key={i} className="list-item">
                        <div className="list-bullet red">{i+1}</div>
                        {s}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {result.follow_up && result.follow_up.length > 0 && (
                <div className="card">
                  <div className="card-header">
                    <div className="card-icon green">📅</div>
                    <div className="card-label">Follow-up Instructions</div>
                  </div>
                  <div className="list-items">
                    {result.follow_up.map((s,i) => (
                      <div key={i} className="list-item">
                        <div className="list-bullet green">✓</div>
                        {s}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <div className="med-table-wrap">
              <div className="med-table-header">
                <h2>💊 Medications <span className="med-count">{result.medications?.length || 0} found</span></h2>
                <span style={{fontSize:12,color:'var(--ink3)'}}>🔔 = Set reminder</span>
              </div>
              <table>
                <thead>
                  <tr>
                    <th>Medicine</th>
                    <th>Dosage</th>
                    <th>Timing</th>
                    <th>Duration</th>
                    <th>Reminder</th>
                  </tr>
                </thead>
                <tbody>
                  {result.medications && result.medications.map((med, i) => (
                    <tr key={i}>
                      <td>
                        <div className="med-name">
                          <div className="med-dot"></div>
                          {med.name}
                        </div>
                      </td>
                      <td><span className="dosage-badge">{med.dosage || 'Not specified'}</span></td>
                      <td><span className="timing-badge">{med.timing || 'Not specified'}</span></td>
                      <td><span className="duration-badge">{med.duration || 'Not specified'}</span></td>
                      <td>
                        <button
                          className={`reminder-btn ${reminders[med.name]?'active':''}`}
                          onClick={()=>toggleReminder(med.name)}
                          title={reminders[med.name]?'Disable reminder':'Enable reminder'}
                        >
                          {reminders[med.name] ? '🔔' : '🔕'}
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            {extractedText && (
              <div>
                <div style={{fontFamily:"'Instrument Serif',serif",fontSize:20,marginBottom:12,marginTop:24}}>Original vs Simplified</div>
                <div className="comparison">
                  <div className="comp-panel">
                    <div className="comp-label original">📄 Original Text</div>
                    <div className="comp-body">{extractedText}</div>
                  </div>
                  <div className="comp-panel">
                    <div className="comp-label simplified">✨ Simplified Summary</div>
                    <div className="comp-body">
                      <strong>Diagnosis:</strong> {result.diagnosis}
                      {'\n\n'}<strong>Medicines:</strong>{'\n'}{result.medications && result.medications.map(m=>`• ${m.name}: ${m.dosage}, ${m.timing}, ${m.duration}`).join('\n')}
                      {result.side_effects && result.side_effects.length > 0 && `\n\n⚠️ Side effects: ${result.side_effects.join('; ')}`}
                      {result.follow_up && result.follow_up.length > 0 && `\n\n📅 Follow-up: ${result.follow_up.join('; ')}`}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ---- SCHEDULE TAB ---- */}
        {activeTab === 'schedule' && result && (
          <div className="fade-in">
            <div className="reminder-panel">
              <div className="reminder-header">
                <div>
                  <div className="section-title">⏰ Medicine Schedule</div>
                  <div className="section-sub">Your daily medication timeline</div>
                </div>
              </div>

              <div className="schedule-grid" style={{marginBottom:32}}>
                {buildSchedule(result.medications || []).map(([time, meds], i, arr) => (
                  <div key={time} className="schedule-time-block">
                    <div className="schedule-time">{time}</div>
                    <div className="schedule-line">
                      <div className="schedule-dot"></div>
                      {i < arr.length - 1 && <div className="schedule-connector"></div>}
                    </div>
                    <div className="schedule-meds">
                      {meds.map(m => (
                        <div key={m} className="schedule-med-pill">💊 {m}</div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>

              <div style={{fontFamily:"'Instrument Serif',serif",fontSize:20,marginBottom:16}}>🔔 Reminders</div>
              <div className="reminders-list">
                {result.medications && result.medications.map(med => (
                  <div key={med.name} className="reminder-item">
                    <div className="reminder-info">
                      <span style={{fontSize:20}}>💊</span>
                      <div>
                        <div style={{fontWeight:600,fontSize:14}}>{med.name}</div>
                        <div className="reminder-times">
                          {parseTimingToReminders(med.timing).map(t => (
                            <span key={t} className="time-pill">{t}</span>
                          ))}
                        </div>
                      </div>
                    </div>
                    <label className="toggle-switch">
                      <input type="checkbox" checked={!!reminders[med.name]} onChange={()=>toggleReminder(med.name)} />
                      <div className="toggle-slider"></div>
                    </label>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ---- HISTORY TAB ---- */}
        {activeTab === 'history' && (
          <div className="fade-in">
            {history.length === 0 ? (
              <div className="history-empty">
                <div className="big-icon">📁</div>
                <div style={{fontFamily:"'Instrument Serif',serif",fontSize:22,marginBottom:8}}>No history yet</div>
                <div style={{fontSize:14}}>Your analyzed prescriptions will appear here. Login to view.</div>
              </div>
            ) : (
              <div className="history-items">
                <div style={{fontFamily:"'Instrument Serif',serif",fontSize:24,marginBottom:16}}>Previous Prescriptions</div>
                {history.map(entry => (
                  <div key={entry.id} className="history-card" onClick={()=>loadHistory(entry)}>
                    <div className="history-card-left">
                      <div className="history-icon">📋</div>
                      <div>
                        <h3>{entry.summary?.slice(0,70)}{entry.summary?.length > 70 ? '...' : ''}</h3>
                        <p>{entry.date} · {entry.medications} medication{entry.medications !== 1 ? 's' : ''}</p>
                      </div>
                    </div>
                    <span style={{fontSize:18,color:'var(--ink3)'}}>→</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </main>

      {/* AUTH MODAL */}
      {authModal && (
        <AuthModal mode={authModal} onClose={()=>setAuthModal(null)} onAuth={handleAuth} />
      )}

      {/* TOAST */}
      {toast && <Toast msg={toast.msg} icon={toast.icon} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
